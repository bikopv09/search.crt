[Database]
# MongoDB Configuration
mongodb_host=localhost
mongodb_port=27017
database_name=searchcrt
mongodb_username=
mongodb_password=
mongodb_auth_source=admin

# Collections
collection_searches=searches
collection_results=results
collection_users=users

[UI]
# User Interface Settings
theme=dark
window_width=600
window_height=400
window_min_width=500
window_min_height=350

# Color Palette
bg_color=#0A1D3A
panel_bg=#102F4D
fg_color=#4DD0E1
fg_text=#FFFFFF
fg_alt=#82B1FF
btn_bg=#133458
btn_active=#1C4E80
warn_color=#FF5252
ok_color=#69F0AE

# Font Settings
font_family=Segoe UI
font_size=10
font_size_title=16

[Features]
# Logging Configuration
enable_logging=True
log_file=./logs/searchcrt.log
log_level=INFO
max_log_size=10MB
log_backups=5

# Search Configuration
search_history_enabled=True
max_search_history=100
result_limit=500

# Processing
enable_threading=True
max_workers=4
chunk_size=1000

# Export
export_formats=csv,xlsx,txt,zip
export_directory=./exports/

[Authentication]
# Security Settings
enable_auth=False
auth_type=local
jwt_secret=your_secret_key_here
session_timeout=3600

# Local Users Database
users_file=./etc/users.json

[Performance]
# Optimization Settings
cache_enabled=True
cache_ttl=3600
max_cache_size=100MB
memory_optimization=True

[Advanced]
# Advanced Settings
debug_mode=False
verbose_output=False
enable_analytics=False
analytics_file=./logs/analytics.log
temp_directory=./tmp/
cleanup_temp_on_exit=True
